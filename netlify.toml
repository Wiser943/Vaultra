[build]
  publish = "public"

# Option A (recommended while using cookies): proxy API calls from Netlify to Render.
# Replace the URL below with your actual Render backend URL after deployment.
# This keeps frontend code using /api/... and avoids many cross-site cookie problems.
#
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-service.onrender.com/api/:splat"
#   status = 200
#   force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
